- id: "SAFE@468cf72:spec/01-base-definition.md#1.p2:b610468e"
  text: |-
    All syntax, legality rules, static semantics, dynamic semantics, and implementation requirements of 8652:2023 apply to Safe programs except where explicitly excluded or modified by this specification.
  section: '1'
  section_title: Base Definition
  source_file: spec/01-base-definition.md
  paragraph: '2'
  classification: conformance_requirement
  normative: true
