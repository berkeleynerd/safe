  text: |-
    Only receive operations appear in select arms, not send. A conforming implementation shall reject any select arm that attempts a send operation.
  section: '4.4'
  section_title: Select Statement
  source_file: spec/04-tasks-and-channels.md
  paragraph: '35'
  classification: legality_rule
  normative: true
  tags:
