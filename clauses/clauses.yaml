  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.4.p36:0bffbd47"
  text: The subtype_mark in a channel_arm shall match the element type of the named channel.
  section: '4.4'
  section_title: Select Statement
  source_file: spec/04-tasks-and-channels.md
  paragraph: '36'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
