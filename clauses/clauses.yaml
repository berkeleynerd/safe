- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.2.6.p23:26dc2217"
  text: |-
    Clients shall not access individual fields of an opaque type. A conforming implementation shall reject any selected component on an opaque type that names a record field, when the reference occurs outside the declaring package.
  section: 3.2.6
  section_title: Opaque Types
  source_file: spec/03-single-file-packages.md
  paragraph: '23'
  classification: legality_rule
  normative: true
  tags:
  - D9
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.2.6.p24:12e57227"
  text: |-
    The implementation shall export sufficient information for clients to allocate objects of the opaque type (size and alignment).
  section: 3.2.6
  section_title: Opaque Types
  source_file: spec/03-single-file-packages.md
  paragraph: '24'
  classification: implementation_requirement
  normative: true
  tags:
  - D9
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.2.9.p31:c2a3dc04"
  text: |-
    Circular with dependencies among compilation units are prohibited. A conforming implementation shall reject any set of compilation units forming a cycle in the with dependency graph.
  section: 3.2.9
  section_title: Circular Dependencies Prohibited
  source_file: spec/03-single-file-packages.md
  paragraph: '31'
  classification: legality_rule
  normative: true
  tags:
  - D7
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.2.10.p32:be83c6b5"
  text: |-
    A library unit shall be a package. Library-level subprograms are not permitted as compilation units. A conforming implementation shall reject any library-level subprogram declaration or body.
  section: 3.2.10
  section_title: Library Units
  source_file: spec/03-single-file-packages.md
  paragraph: '32'
  classification: legality_rule
  normative: true
  tags:
  - D6
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.3.1.p33:b08ead48"
  text: |-
    A conforming implementation shall make the following information available for each package, to support separate compilation and cross-unit legality checking.
  section: 3.3.1
  section_title: Dependency Interface Information
  source_file: spec/03-single-file-packages.md
  paragraph: '33'
  classification: implementation_requirement
  normative: true
  tags:
  - D6
  tbd: false
  notes: 9 categories of interface info
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.3.1.p34:2a0b2728"
  text: The mechanism for conveying this information is implementation-defined.
  section: 3.3.1
  section_title: Dependency Interface Information
  source_file: spec/03-single-file-packages.md
  paragraph: '34'
  classification: implementation_requirement
  normative: true
  tags:
  - D6
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.3.1.p35:0bbb4bb7"
  text: "If required dependency interface information is unavailable for a with'd package, the program shall be rejected."
  section: 3.3.1
  section_title: Dependency Interface Information
  source_file: spec/03-single-file-packages.md
  paragraph: '35'
  classification: legality_rule
  normative: true
  tags:
  - D6
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.3.4.p40:cdfbcb6b"
  text: |-
    A child package does not have additional visibility into the non-public declarations of its parent beyond what with Parent; provides.
  section: 3.3.4
  section_title: Child Packages
  source_file: spec/03-single-file-packages.md
  paragraph: '40'
  classification: static_semantics
  normative: true
  tags:
  - D6
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.4.1.p42:b88e8ad4"
  text: Package-level variable initialisers are evaluated at load time in declaration order (top to bottom).
  section: 3.4.1
  section_title: Package Initialisation
  source_file: spec/03-single-file-packages.md
  paragraph: '42'
  classification: dynamic_semantics
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.4.2.p44:a655dde4"
  text: "If package A withs package B, then B's initialisers complete before A's initialisers begin."
  section: 3.4.2
  section_title: Cross-Package Initialisation Order
  source_file: spec/03-single-file-packages.md
  paragraph: '44'
  classification: dynamic_semantics
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.4.2.p45:80712e1a"
  text: |-
    The initialisation order across all compilation units is a topological sort of the with dependency graph. The order among packages with no direct or transitive dependency is implementation-defined but deterministic for a given program.
  section: 3.4.2
  section_title: Cross-Package Initialisation Order
  source_file: spec/03-single-file-packages.md
  paragraph: '45'
  classification: dynamic_semantics
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.4.3.p46:b5f92bd9"
  text: All package-level initialisation across all compilation units completes before any task begins executing.
  section: 3.4.3
  section_title: Task Startup Sequencing
  source_file: spec/03-single-file-packages.md
  paragraph: '46'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.5.1.p47:b7e93197"
  text: |-
    A conforming implementation shall provide a mechanism for conveying dependency interface information between separately compiled units. The mechanism is implementation-defined.
  section: 3.5.1
  section_title: Dependency Interface Mechanism
  source_file: spec/03-single-file-packages.md
  paragraph: '47'
  classification: implementation_requirement
  normative: true
  tags:
  - D6
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.5.1.p48:616dd05d"
  text: |-
    The mechanism shall be sufficient to support: legality checking of client code against provider interfaces, task-variable ownership checking using effect summaries from transitive dependencies, and incremental recompilation when a provider's interface changes.
  section: 3.5.1
  section_title: Dependency Interface Mechanism
  source_file: spec/03-single-file-packages.md
  paragraph: '48'
  classification: implementation_requirement
  normative: true
  tags:
  - D6
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/03-single-file-packages.md#3.5.2.p49:02b25de0"
  text: |-
    A conforming implementation shall support separate compilation of packages. Each package shall be compilable independently, given only its source and the dependency interface information of its with'd packages.
  section: 3.5.2
  section_title: Separate Compilation
  source_file: spec/03-single-file-packages.md
  paragraph: '49'
  classification: implementation_requirement
  normative: true
  tags:
  - D6
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.1.p2:78f022f7"
  text: |-
    A task declaration shall appear only at the top level of a package. A conforming implementation shall reject any task declaration appearing within a subprogram body, block statement, or nested scope.
  section: '4.1'
  section_title: Task Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '2'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.1.p3:542e0dee"
  text: Each task declaration creates exactly one task. There are no task types, no dynamic task creation, no task arrays.
  section: '4.1'
  section_title: Task Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '3'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.1.p4:016e5737"
  text: |-
    The defining_identifier after end shall match the defining_identifier after task. A conforming implementation shall reject any task where the end identifier does not match.
  section: '4.1'
  section_title: Task Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '4'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.1.p5:4e4afebc"
  text: |-
    If a Priority aspect is specified, the static expression shall evaluate to a value in the range System.Any_Priority. A conforming implementation shall reject a priority value outside this range.
  section: '4.1'
  section_title: Task Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '5'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.1.p6:be85291b"
  text: A task declaration shall not bear the public keyword.
  section: '4.1'
  section_title: Task Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '6'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.1.p7:393c53c2"
  text: |-
    Task declarations shall not be nested. A task body shall not contain another task declaration. A conforming implementation shall reject any task declaration appearing within a task body.
  section: '4.1'
  section_title: Task Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '7'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.1.p9:b4640bda"
  text: |-
    If no Priority is specified, the task has the default priority defined by the implementation. The default priority shall be documented by the implementation.
  section: '4.1'
  section_title: Task Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '9'
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.1.p10:92a67777"
  text: Each task declaration creates a single task that begins execution after all package-level initialisation completes.
  section: '4.1'
  section_title: Task Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '10'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.1.p11:2460c5cb"
  text: |-
    The task executes its handled_sequence_of_statements as an independent thread of control. Scheduling among tasks is preemptive priority-based.
  section: '4.1'
  section_title: Task Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '11'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.2.p13:4f888b03"
  text: |-
    A channel declaration shall appear only at the top level of a package. A conforming implementation shall reject any channel declaration appearing within a subprogram body, task body, or nested scope.
  section: '4.2'
  section_title: Channel Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '13'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.2.p14:a35bd0fa"
  text: |-
    The element type shall be a definite type. A conforming implementation shall reject a channel whose element type is indefinite.
  section: '4.2'
  section_title: Channel Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '14'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.2.p15:b5b29b0e"
  text: |-
    The capacity shall evaluate to a positive integer. A conforming implementation shall reject a channel with a capacity less than 1.
  section: '4.2'
  section_title: Channel Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '15'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.2.p20:8aa1a21e"
  text: "A channel is a FIFO queue: elements are dequeued in the order they were enqueued."
  section: '4.2'
  section_title: Channel Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '20'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.2.p21:c6a92460"
  text: |-
    When the implementation maps channels to underlying synchronisation mechanisms, it shall assign a ceiling priority to each channel. The ceiling priority of a channel shall be at least the maximum of the priorities of all tasks that access that channel.
  section: '4.2'
  section_title: Channel Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '21'
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  tbd: false
  notes: Ceiling priority for channels
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.2.p21a:16ec46cb"
  text: |-
    A conforming implementation shall compute each channel's ceiling priority from the priorities of all tasks that access the channel, using channel-access summaries from dependency interface information for cross-package calls.
  section: '4.2'
  section_title: Channel Declarations
  source_file: spec/04-tasks-and-channels.md
  paragraph: 21a
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  tbd: false
  notes: Cross-package ceiling computation
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p23:197d9a49"
  text: "The expression in a send or try_send shall be of the channel's element type or a subtype thereof."
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '23'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p24:9e47ed4c"
  text: "The name in a receive or try_receive shall denote a variable of the channel's element type or a subtype thereof."
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '24'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p25:961abe5a"
  text: The final name in try_send and try_receive shall denote a variable of type Boolean.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '25'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p26:3a9449c1"
  text: Channel operations shall not appear at the package level.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '26'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p27:ef0ce6bd"
  text: |-
    send Ch, Value: Enqueue Value into channel Ch. If Ch is full, the current task blocks until space becomes available. The expression Value is evaluated before the enqueue.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '27'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: send semantics
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p27a:8ed3c1d4"
  text: |-
    If the element type is an owning access type, send performs a move: the source object becomes null after the send completes. A conforming implementation shall reject any subsequent dereference of the source object unless it has been reassigned or verified as non-null.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: 27a
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: Ownership transfer on send
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p28:ea6bd13c"
  text: |-
    receive Ch, Variable: Dequeue the front element of channel Ch into Variable. If Ch is empty, the current task blocks until an element becomes available.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '28'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: receive semantics
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p28a:4cb19779"
  text: |-
    If the element type is an owning access type, receive performs a move from the channel into Variable. The null-before-move legality rule applies: Variable shall be provably null at the point of the receive.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: 28a
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: Ownership transfer on receive
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p29:f792d704"
  text: |-
    try_send Ch, Value, Success: Attempt to enqueue Value into channel Ch without blocking. The operation is performed atomically.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '29'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: try_send semantics
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p29a:8d3f2225"
  text: |-
    If the element type is an owning access type, the move of Value occurs only when the enqueue succeeds. The implementation shall ensure that the evaluation of Value and the fullness check are performed atomically.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: 29a
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: Move-only-on-success for try_send
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p29b:7121ccd7"
  text: |-
    For owning access types, the implementation shall not null the source variable until the enqueue is confirmed to succeed.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: 29b
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: Deferred nulling for try_send
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p30:62619161"
  text: |-
    try_receive Ch, Variable, Success: Attempt to dequeue the front element of channel Ch without blocking. Variable shall be provably null at the point of the try_receive.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '30'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: try_receive semantics
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p31:a7297e97"
  text: |-
    Channel operations are atomic with respect to other channel operations on the same channel. The implementation shall ensure that concurrent send and receive operations on the same channel do not corrupt the channel state.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: '31'
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  tbd: false
  notes: Channel atomicity
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.3.p31a:a621d08c"
  text: |-
    At any point during program execution, each designated object reachable through an owning access value in a channel element is owned by exactly one entity.
  section: '4.3'
  section_title: Channel Operations
  source_file: spec/04-tasks-and-channels.md
  paragraph: 31a
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: Channel ownership invariant
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.4.p33:7a94ab51"
  text: A select statement shall contain at least one channel_arm.
  section: '4.4'
  section_title: Select Statement
  source_file: spec/04-tasks-and-channels.md
