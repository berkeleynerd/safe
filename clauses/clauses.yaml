  paragraph: '38'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.4.p39:1012f4db"
  text: |-
    When the select statement is evaluated, the implementation tests each arm in declaration order. The first arm whose channel has data available is selected.
  section: '4.4'
  section_title: Select Statement
  source_file: spec/04-tasks-and-channels.md
  paragraph: '39'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: select arm ordering
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.4.p40:4cfdeffe"
  text: If the delay expires before any channel arm becomes ready, the delay arm is selected.
  section: '4.4'
  section_title: Select Statement
  source_file: spec/04-tasks-and-channels.md
  paragraph: '40'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.4.p41:cdf6a558"
  text: If multiple channels become ready simultaneously, the first listed channel arm is selected. This is deterministic.
  section: '4.4'
  section_title: Select Statement
  source_file: spec/04-tasks-and-channels.md
  paragraph: '41'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: Deterministic select
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.4.p42:dce8ac38"
  text: If no channel arm is ready and no delay arm is present, the select blocks until one channel arm becomes ready.
  section: '4.4'
  section_title: Select Statement
  source_file: spec/04-tasks-and-channels.md
  paragraph: '42'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.5.p45:8bdd0c99"
  text: |-
    Each package-level variable shall be accessed by at most one task. The implementation shall verify this at compile time. A conforming implementation shall reject any program where a package-level variable is accessed by more than one task.
  section: '4.5'
  section_title: Task-Variable Ownership
  source_file: spec/04-tasks-and-channels.md
  paragraph: '45'
  classification: legality_rule
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: No shared mutable state
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.5.p47:bc08fb3b"
  text: |-
    For subprograms in with'd packages, the implementation shall use the effect summaries from dependency interface information to determine which package-level variables are accessed. The ownership check shall be completable from the compilation unit's source plus its direct and transitive dependency interface information.
  section: '4.5'
  section_title: Task-Variable Ownership
  source_file: spec/04-tasks-and-channels.md
  paragraph: '47'
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: Cross-package transitivity
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.5.p49:d2001725"
  text: |-
    A subprogram shall not access any package-level variable if it is callable from more than one task. A conforming implementation shall reject any subprogram that accesses a package-level variable and is callable from multiple task bodies.
  section: '4.5'
  section_title: Task-Variable Ownership
  source_file: spec/04-tasks-and-channels.md
  paragraph: '49'
  classification: legality_rule
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: Multi-task subprogram restriction
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.5.p50:2882310a"
  text: |-
    Channel operations do not constitute access to a package-level variable for the purposes of the task-variable ownership rule.
  section: '4.5'
  section_title: Task-Variable Ownership
  source_file: spec/04-tasks-and-channels.md
  paragraph: '50'
  classification: static_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: Channels exempt from ownership rule
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.6.p53:897d5577"
  text: Tasks shall not terminate. The outermost statement of the task body shall be an unconditional loop statement.
  section: '4.6'
  section_title: Non-Termination Legality Rule
  source_file: spec/04-tasks-and-channels.md
  paragraph: '53'
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.6.p53b:19b7c4ae"
  text: |-
    A return statement shall not appear anywhere within a task body. A conforming implementation shall reject any return statement within a task body.
  section: '4.6'
  section_title: Non-Termination Legality Rule
  source_file: spec/04-tasks-and-channels.md
  paragraph: 53b
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.6.p53c:77a5f52c"
  text: No exit statement within the task body shall name or otherwise target the outermost loop.
  section: '4.6'
  section_title: Non-Termination Legality Rule
  source_file: spec/04-tasks-and-channels.md
  paragraph: 53c
  classification: legality_rule
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.7.p56:55e4230e"
  text: |-
    All package-level declarations and initialisations across all compilation units complete before any task begins executing. This is a language-level sequencing guarantee.
  section: '4.7'
  section_title: Task Startup
  source_file: spec/04-tasks-and-channels.md
  paragraph: '56'
  classification: dynamic_semantics
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/04-tasks-and-channels.md#4.7.p58:d10f9cd1"
  text: The order in which tasks are activated relative to each other is implementation-defined.
  section: '4.7'
  section_title: Task Startup
  source_file: spec/04-tasks-and-channels.md
  paragraph: '58'
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.1.p2:14a5a600"
  text: Every conforming Safe program achieves Stone, Bronze, and Silver without developer-supplied annotations.
  section: '5.1'
  section_title: Overview of Assurance Levels
  source_file: spec/05-assurance.md
  paragraph: '2'
  classification: conformance_requirement
  normative: true
  tags:
  - D26
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.2.1.p3:ce5a8fe7"
  text: |-
    Every conforming Safe program shall have complete and correct flow information derivable from its source without user-supplied annotations.
  section: 5.2.1
  section_title: Normative Statement (Bronze)
  source_file: spec/05-assurance.md
  paragraph: '3'
  classification: conformance_requirement
  normative: true
  tags:
  - D26
  - Bronze
  tbd: false
  notes: Bronze guarantee
- id: "SAFE@468cf72:spec/05-assurance.md#5.2.2.p5:a07e15ef"
  text: |-
    For each subprogram, a conforming implementation shall be able to determine the set of package-level variables read and written, including transitive effects through called subprograms.
  section: 5.2.2
  section_title: Global Information
  source_file: spec/05-assurance.md
  paragraph: '5'
  classification: implementation_requirement
  normative: true
  tags:
  - D26
  - Bronze
  tbd: false
  notes: Global equivalent
- id: "SAFE@468cf72:spec/05-assurance.md#5.2.3.p8:dfb93f2c"
  text: For each subprogram, a conforming implementation shall be able to determine which outputs depend on which inputs.
  section: 5.2.3
  section_title: Depends Information
  source_file: spec/05-assurance.md
  paragraph: '8'
  classification: implementation_requirement
  normative: true
  tags:
  - D26
  - Bronze
  tbd: false
  notes: Depends equivalent
- id: "SAFE@468cf72:spec/05-assurance.md#5.2.4.p11:b89bd341"
  text: |-
    For each package, a conforming implementation shall be able to determine which package-level variables are initialised at elaboration.
  section: 5.2.4
  section_title: Initializes Information
  source_file: spec/05-assurance.md
  paragraph: '11'
  classification: implementation_requirement
  normative: true
  tags:
  - D26
  - Bronze
  tbd: false
  notes: Initializes equivalent
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.1.p12:99a94209"
  text: |-
    Every conforming Safe program shall be free of runtime errors. Every runtime check that the implementation must perform shall be dischargeable from static type and range information derivable from the program text, combined with the D27 legality rules.
  section: 5.3.1
  section_title: Normative Statement (Silver)
  source_file: spec/05-assurance.md
  paragraph: '12'
  classification: conformance_requirement
  normative: true
  tags:
  - D27
  - Silver
  tbd: false
  notes: Silver guarantee
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.1.p12a:047a8410"
  text: |-
    The Silver guarantee covers the runtime checks enumerable from the program text and the language semantics. It does not cover resource exhaustion conditions (allocation failure, stack overflow).
  section: 5.3.1
  section_title: Normative Statement (Silver)
  source_file: spec/05-assurance.md
  paragraph: 12a
  classification: conformance_requirement
  normative: true
  tags:
  - Silver
  tbd: false
  notes: Silver scope
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.2.p15:1ab3314c"
  text: |-
    A conforming implementation shall reject any program where the static range of a declared integer type exceeds 64-bit signed range.
  section: 5.3.2
  section_title: Wide Intermediate Arithmetic
  source_file: spec/05-assurance.md
  paragraph: '15'
  classification: legality_rule
  normative: true
  tags:
  - D27
  - Silver
  - Rule1
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.2.p16:2e323902"
  text: |-
    A conforming implementation shall reject any integer expression where it cannot establish that all intermediate subexpressions stay within 64-bit signed range.
  section: 5.3.2
  section_title: Wide Intermediate Arithmetic
  source_file: spec/05-assurance.md
  paragraph: '16'
  classification: legality_rule
  normative: true
  tags:
  - D27
  - Silver
  - Rule1
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.6.p25:e8253bd7"
  text: The implementation shall discharge range checks via sound static range analysis.
  section: 5.3.6
  section_title: Range Checks at Narrowing Points
  source_file: spec/05-assurance.md
  paragraph: '25'
  classification: implementation_requirement
  normative: true
  tags:
  - D27
  - Silver
  - range-check
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.6.p26:9ca2c786"
  text: |-
    If a conforming implementation cannot establish that a narrowing point is safe, the program is nonconforming and shall be rejected with a diagnostic.
  section: 5.3.6
  section_title: Range Checks at Narrowing Points
  source_file: spec/05-assurance.md
  paragraph: '26'
  classification: legality_rule
  normative: true
  tags:
  - D27
  - Silver
  - range-check
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.7.p27:e63b291b"
  text: The implementation shall verify that access to a variant component is consistent with the current discriminant value.
  section: 5.3.7
  section_title: Discriminant Checks
  source_file: spec/05-assurance.md
  paragraph: '27'
  classification: implementation_requirement
  normative: true
  tags:
  - Silver
  - discriminant-check
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.7a.p28a:5936dbea"
  text: |-
    A conforming implementation shall ensure that all predefined floating-point types use IEEE 754 default non-trapping arithmetic (Machine_Overflows = False).
  section: 5.3.7a
  section_title: Floating-Point Non-Trapping Semantics
  source_file: spec/05-assurance.md
  paragraph: 28a
  classification: implementation_requirement
  normative: true
  tags:
  - D27
  - Silver
  - Rule5
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.9.p30:c7a2cbdb"
  text: |-
    If a conforming implementation cannot establish that a required runtime check will not fail, the program is nonconforming and the implementation shall reject it with a diagnostic.
  section: 5.3.9
  section_title: Hard Rejection Rule
  source_file: spec/05-assurance.md
  paragraph: '30'
  classification: conformance_requirement
  normative: true
  tags:
  - Silver
  tbd: false
  notes: Hard rejection
- id: "SAFE@468cf72:spec/05-assurance.md#5.3.9.p31:f6ea7939"
  text: |-
    There is no 'developer must restructure' advisory - failure to satisfy any Silver-level proof obligation is a compilation error, not a warning.
  section: 5.3.9
  section_title: Hard Rejection Rule
  source_file: spec/05-assurance.md
  paragraph: '31'
  classification: conformance_requirement
  normative: true
  tags:
  - Silver
  tbd: false
  notes: No advisory warnings
- id: "SAFE@468cf72:spec/05-assurance.md#5.4.1.p32:90d4f527"
  text: The channel-based tasking model guarantees data race freedom as a language property.
  section: 5.4.1
  section_title: Data Race Freedom
  source_file: spec/05-assurance.md
  paragraph: '32'
  classification: conformance_requirement
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.4.1.p33:0fc25399"
  text: |-
    The implementation shall verify data race freedom through task-variable ownership analysis: each package-level variable is accessed by at most one task.
  section: 5.4.1
  section_title: Data Race Freedom
  source_file: spec/05-assurance.md
  paragraph: '33'
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.4.2.p34:198b1ddf"
  text: |-
    When mapping channels to underlying synchronisation mechanisms, the implementation shall use ceiling priority rules to prevent priority inversion.
  section: 5.4.2
  section_title: Priority Inversion Avoidance
  source_file: spec/05-assurance.md
  paragraph: '34'
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/05-assurance.md#5.4.4.p40:36087a2c"
  text: Effect summaries on task bodies shall reference only owned variables and channel operations.
  section: 5.4.4
  section_title: Task-Variable Ownership
  source_file: spec/05-assurance.md
  paragraph: '40'
  classification: implementation_requirement
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.1.p1a:ba2c1d31"
  text: |-
    A conforming implementation shall accept every conforming program and produce an executable representation or a functionally equivalent intermediary.
  section: '6.1'
  section_title: Conforming Implementation
  source_file: spec/06-conformance.md
  paragraph: 1a
  classification: conformance_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.1.p1b:3890c549"
  text: |-
    A conforming implementation shall reject every non-conforming program with a diagnostic that identifies the violated rule.
  section: '6.1'
  section_title: Conforming Implementation
  source_file: spec/06-conformance.md
  paragraph: 1b
  classification: conformance_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.1.p1c:1f8fe478"
  text: |-
    A conforming implementation shall implement the dynamic semantics of 8652:2023 correctly for all conforming programs, as modified by this specification.
  section: '6.1'
  section_title: Conforming Implementation
  source_file: spec/06-conformance.md
  paragraph: 1c
  classification: conformance_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.1.p1d:19219997"
  text: A conforming implementation shall enforce all legality rules defined in this specification, including the D27 Rules 1-5.
  section: '6.1'
  section_title: Conforming Implementation
  source_file: spec/06-conformance.md
  paragraph: 1d
  classification: conformance_requirement
  normative: true
  tags:
  - D27
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.1.p1e:d0e6c93b"
  text: A conforming implementation shall enforce the task-variable ownership rule as a legality rule.
  section: '6.1'
  section_title: Conforming Implementation
  source_file: spec/06-conformance.md
  paragraph: 1e
  classification: conformance_requirement
  normative: true
  tags:
  - D28
  - ownership
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.1.p1f:2410637e"
  text: A conforming implementation shall derive flow analysis information without requiring user-supplied annotations.
  section: '6.1'
  section_title: Conforming Implementation
  source_file: spec/06-conformance.md
  paragraph: 1f
  classification: conformance_requirement
  normative: true
  tags:
  - D26
  - Bronze
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.1.p1g:80745a1e"
  text: |-
    A conforming implementation shall provide a mechanism for separate compilation of units and combination of separately compiled units into a program.
  section: '6.1'
  section_title: Conforming Implementation
  source_file: spec/06-conformance.md
  paragraph: 1g
  classification: implementation_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.1.p2:983b5f84"
  text: |-
    A conforming implementation may provide additional capabilities beyond those required by this specification, provided that these do not alter the semantics of conforming programs.
  section: '6.1'
  section_title: Conforming Implementation
  source_file: spec/06-conformance.md
  paragraph: '2'
  classification: conformance_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.2.p4:3e238301"
  text: |-
    A program for which a conforming implementation cannot establish that all required runtime checks are dischargeable is non-conforming and shall be rejected.
  section: '6.2'
  section_title: Conforming Program
  source_file: spec/06-conformance.md
  paragraph: '4'
  classification: conformance_requirement
  normative: true
  tags:
  - Silver
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.4.p11:f35e2134"
  text: |-
    All static analyses performed by a conforming implementation to enforce the D27 rules shall be sound: they may conservatively reject programs that are actually safe, but they shall never accept programs that contain potential runtime errors.
  section: '6.4'
  section_title: Soundness
  source_file: spec/06-conformance.md
  paragraph: '11'
  classification: conformance_requirement
  normative: true
  tags:
  - D27
  - Silver
  tbd: false
  notes: Soundness requirement
- id: "SAFE@468cf72:spec/06-conformance.md#6.4.p11b:6e973d1d"
  text: If a conforming implementation cannot establish that a runtime check is dischargeable, it shall reject the program.
  section: '6.4'
  section_title: Soundness
  source_file: spec/06-conformance.md
  paragraph: 11b
  classification: conformance_requirement
  normative: true
  tags:
  - D27
  - Silver
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.5.1.p16:b89b7765"
  text: |-
    A conforming implementation shall support separate compilation of Safe packages. Each package shall be compilable independently using only its source and the dependency interface information of its with'd packages.
  section: 6.5.1
  section_title: Separate Compilation
  source_file: spec/06-conformance.md
  paragraph: '16'
  classification: implementation_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.5.2.p17:70300f7a"
  text: |-
    A conforming implementation shall provide a mechanism for conveying dependency interface information between separately compiled units.
  section: 6.5.2
  section_title: Dependency Interface
  source_file: spec/06-conformance.md
  paragraph: '17'
  classification: implementation_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.5.2.p18:ae5640ac"
  text: |-
    The dependency interface shall include at minimum: public declarations and their types, subprogram signatures, effect summaries, size and alignment for opaque types, and channel-access summaries.
  section: 6.5.2
  section_title: Dependency Interface
  source_file: spec/06-conformance.md
  paragraph: '18'
  classification: implementation_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.5.3.p19:5d4dfb69"
  text: |-
    A conforming implementation shall provide a mechanism for combining separately compiled units into an executable program.
  section: 6.5.3
  section_title: Linking
  source_file: spec/06-conformance.md
  paragraph: '19'
  classification: implementation_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.6.p20a:d74e6ca7"
  text: |-
    When a conforming implementation rejects a non-conforming program, the diagnostic shall identify the source file, line number, and column of the violation.
  section: '6.6'
  section_title: Diagnostics
  source_file: spec/06-conformance.md
  paragraph: 20a
  classification: implementation_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.6.p20b:74ad00a2"
  text: The diagnostic shall identify which rule is violated.
  section: '6.6'
  section_title: Diagnostics
  source_file: spec/06-conformance.md
  paragraph: 20b
  classification: implementation_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
- id: "SAFE@468cf72:spec/06-conformance.md#6.7.p22:03afd0a4"
  text: A conforming implementation shall document its choices for each implementation-defined behaviour.
  section: '6.7'
  section_title: Implementation-Defined Behaviour
  source_file: spec/06-conformance.md
  paragraph: '22'
  classification: implementation_requirement
  normative: true
  tags:
  - impl-defined
  tbd: false
  notes: 9 categories of impl-defined behaviour
- id: "SAFE@468cf72:spec/06-conformance.md#6.8.p23:3419a843"
  text: |-
    A conforming implementation shall provide a runtime system sufficient to support: task creation and scheduling, channel operations with blocking semantics, the relative delay statement, automatic deallocation at scope exit, and the runtime abort handler.
  section: '6.8'
  section_title: Runtime Requirements
  source_file: spec/06-conformance.md
  paragraph: '23'
  classification: implementation_requirement
  normative: true
  tags: []
  tbd: false
  notes: ''
