- id: "SAFE@468cf72:spec/01-base-definition.md#1.p3:a2ff4ad4"
  text: |-
    A construct that appears in 8652:2023 but is not mentioned in Section 2 (Restrictions and Modifications) is retained in Safe with its 8652:2023 semantics, subject to the notation changes specified in Section 2, S2.4 (dot notation for attributes, type annotation syntax).
  section: '1'
  section_title: Base Definition
  source_file: spec/01-base-definition.md
  paragraph: '3'
  classification: static_semantics
  normative: true
