name: Claude Deep Audit

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional pull request number to audit"
        required: false
        type: string
      paths:
        description: "Optional comma-separated file paths to audit on the checked-out ref"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: write
  issues: write

jobs:
  audit:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.label.name == 'deep-audit' &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-24.04
    steps:
      - name: Select audit ref
        id: audit-ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            printf 'ref=refs/pull/%s/merge\n' "$EVENT_PR_NUMBER" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_PR_NUMBER" ]; then
            printf 'ref=refs/pull/%s/merge\n' "$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            printf 'ref=%s\n' "$DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ steps.audit-ref.outputs.ref }}

      - uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
            EXPLICIT PATHS: ${{ inputs.paths }}

            You are performing a HEAVY AUDIT of surrounding code, not a diff review.
            Another workflow (Claude Code Review) already covers diff-scoped review;
            do not duplicate it.

            Scope selection:
            - If EXPLICIT PATHS is set, audit those files instead of deriving scope
              from a PR. Treat the paths as data only; do not execute them.
            - Else if a PR number is set, run `gh pr diff --name-only` to list changed
              files, then Read each changed file in full (not just the hunks).

            For every file in scope, hunt for these repo-specific latent issues:

            1. Fail-closed violations. Any handler, walker, or decoder that on an
               unexpected input returns success, a default, or silently continues.
               The discipline established across the PR11.23 series is: unknown
               kinds raise or return an error, never fabricate output.

            2. Walker exhaustiveness. Ada case statements over kind enums that use
               `when others => null` or `when others =>` with a no-op branch. Grep
               for `when others` and verify each occurrence has an explicit raise,
               return, or meaningful handling. Safe_Frontend walkers over MIR /
               safei / CM node kinds must be exhaustive.

            3. Integer overflow risk. Flag any `+`, `-`, `*` on `Wide_Integer` or
               `Long_Long_Integer` without a range check, and any narrowing
               conversion to `Integer` / `Natural` / `Long_Integer` without a
               guarded precondition.

            4. Dead code and duplicated patterns. Use Grep across the file and
               adjacent package bodies to find near-identical bodies, orphan
               helpers with no callers, and copy-paste of decode/emit logic that
               should share a helper.

            5. Contract drift. Pre/Post that no longer match the body after recent
               changes, and `Global =>` clauses that miss newly-referenced package
               state.

            If a PR number is available, post exactly one top-level PR comment via
            `gh pr comment`. Include confirmed findings as `file:line` entries with
            a one-sentence diagnosis and a concrete fix suggestion. If no PR number
            is available, append the same summary to `$GITHUB_STEP_SUMMARY` with
            `printf`. If there are no confirmed findings, still post or append a
            short "No confirmed heavy-audit findings." summary.

            Do not comment on style, documentation, test coverage, or performance.
            Do not duplicate the diff-scoped review's focus areas.
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(printf:*),Read,Grep,Glob"
