name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  LC_ALL: C.UTF-8
  TZ: UTC

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
      - uses: ./.github/actions/setup-alire
      - run: python3 scripts/run_tests.py
      - run: python3 scripts/run_samples.py

  prove:
    name: Prove
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"
      - uses: ./.github/actions/setup-alire
      - run: python3 scripts/run_proofs.py
