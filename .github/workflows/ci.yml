# Safe Language Annotated SPARK Companion -- CI Workflow
# Source commit: 468cf72332724b04b7c193b4d2a3b02f1584125d
#
# This workflow builds the SPARK companion, runs GNATprove flow and proof
# analysis, extracts assumptions, and diffs them against the tracked baseline.

name: SPARK Companion CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FROZEN_SHA: "468cf72332724b04b7c193b4d2a3b02f1584125d"

defaults:
  run:
    working-directory: companion/gen

jobs:
  execution-guard:
    name: Execution Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Python is installed only to run the PR06.7 gate script and the unchanged
      # PR05/PR06 harnesses it invokes. `safec check` itself must not depend on
      # Python at runtime.
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Validate execution tracker and repo facts
        working-directory: .
        run: python3 scripts/validate_execution_state.py

  lint-safe-syntax:
    name: Lint Safe Surface Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lint .safe test files
        working-directory: .
        run: |
          chmod +x scripts/lint_safe_syntax.sh
          scripts/lint_safe_syntax.sh

  frontend-smoke:
    name: Frontend Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Install Alire
        uses: alire-project/setup-alire@b607671067a8ca5d7b7f4a12dadb4dc009cd2cc7 # v3
        with:
          version: 2.1.0
          toolchain: gnat_native gprbuild

      - name: Run frontend smoke checks
        working-directory: .
        run: python3 scripts/run_frontend_smoke.py

  pr05-d27-harness:
    name: PR05 D27 Harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Install Alire
        uses: alire-project/setup-alire@b607671067a8ca5d7b7f4a12dadb4dc009cd2cc7 # v3
        with:
          version: 2.1.0
          toolchain: gnat_native gprbuild

      - name: Build compiler frontend
        working-directory: .
        run: cd compiler_impl && alr build

      - name: Run PR05 D27 harness
        working-directory: .
        run: python3 scripts/run_pr05_d27_harness.py

  pr06-ownership-harness:
    name: PR06 Ownership Harness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Install Alire
        uses: alire-project/setup-alire@b607671067a8ca5d7b7f4a12dadb4dc009cd2cc7 # v3
        with:
          version: 2.1.0
          toolchain: gnat_native gprbuild

      - name: Build compiler frontend
        working-directory: .
        run: cd compiler_impl && alr build

      - name: Run PR06 ownership harness
        working-directory: .
        run: python3 scripts/run_pr06_ownership_harness.py

  pr065-ada-mir-validator:
    name: PR06.5 Ada MIR Validator
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Install Alire
        uses: alire-project/setup-alire@b607671067a8ca5d7b7f4a12dadb4dc009cd2cc7 # v3
        with:
          version: 2.1.0
          toolchain: gnat_native gprbuild

      - name: Build compiler frontend
        working-directory: .
        run: cd compiler_impl && alr build

      - name: Run PR06.5 Ada MIR validator gate
        working-directory: .
        run: python3 scripts/run_pr065_ada_mir_validator.py

  pr066-ada-mir-analyzer:
    name: PR06.6 Ada MIR Analyzer
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Install Alire
        uses: alire-project/setup-alire@b607671067a8ca5d7b7f4a12dadb4dc009cd2cc7 # v3
        with:
          version: 2.1.0
          toolchain: gnat_native gprbuild

      - name: Build compiler frontend
        working-directory: .
        run: cd compiler_impl && alr build

      - name: Run PR06.6 Ada MIR analyzer gate
        working-directory: .
        run: python3 scripts/run_pr066_ada_mir_analyzer.py

  pr067-ada-check-no-python:
    name: PR06.7 Ada Check No Python
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Install Alire
        uses: alire-project/setup-alire@b607671067a8ca5d7b7f4a12dadb4dc009cd2cc7 # v3
        with:
          version: 2.1.0
          toolchain: gnat_native gprbuild

      - name: Build compiler frontend
        working-directory: .
        run: cd compiler_impl && alr build

      # The gate masks Python for `safec check` invocations and fails if the
      # check path attempts to spawn the Python backend.
      - name: Run PR06.7 Ada check cutover gate
        working-directory: .
        run: python3 scripts/run_pr067_ada_check_cutover.py

  spark-verify:
    name: Build & Verify SPARK Companion
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ------------------------------------------------------------------
      # Install GNAT and GNATprove via Alire
      # ------------------------------------------------------------------
      - name: Install Alire
        uses: alire-project/setup-alire@b607671067a8ca5d7b7f4a12dadb4dc009cd2cc7 # v3
        with:
          toolchain: gnat_native gprbuild

      - name: Initialize Alire workspace and install GNATprove
        run: |
          alr install gnatprove
          echo "${HOME}/.alire/bin" >> "$GITHUB_PATH"

      - name: Verify tools
        run: |
          alr exec -- gprbuild --version | head -1
          gnatprove --version | head -1

      - name: Record toolchain version for cache key
        id: toolchain-version
        run: echo "gnatprove=$(gnatprove --version 2>&1 | head -1 || echo unknown)" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Verify frozen commit SHA
      # ------------------------------------------------------------------
      - name: Verify frozen commit SHA
        working-directory: .
        run: |
          REPO_SHA="$(cat meta/commit.txt | tr -d '[:space:]')"
          echo "Frozen SHA from meta/commit.txt: ${REPO_SHA}"
          echo "Expected SHA from workflow env:  ${FROZEN_SHA}"
          if [[ "${REPO_SHA}" != "${FROZEN_SHA}" ]]; then
            echo "ERROR: Frozen SHA mismatch. meta/commit.txt=${REPO_SHA} != env.FROZEN_SHA=${FROZEN_SHA}"
            exit 1
          fi

      # ------------------------------------------------------------------
      # Cache GNATprove results
      # ------------------------------------------------------------------
      - name: Cache GNATprove results
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            companion/gen/obj/gnatprove
          key: gnatprove-${{ runner.os }}-${{ steps.toolchain-version.outputs.gnatprove }}-${{ hashFiles('companion/spark/*.ads', 'companion/spark/*.adb', 'companion/gen/companion.gpr') }}
          restore-keys: |
            gnatprove-${{ runner.os }}-

      # ------------------------------------------------------------------
      # Ensure build directory exists
      # ------------------------------------------------------------------
      - name: Prepare build directory
        run: mkdir -p obj

      # ------------------------------------------------------------------
      # Make scripts executable
      # ------------------------------------------------------------------
      - name: Make scripts executable
        working-directory: .
        run: chmod +x scripts/*.sh

      # ------------------------------------------------------------------
      # Step 1: Compile
      # ------------------------------------------------------------------
      - name: "Step 1: Compile (alr build)"
        run: alr build

      # ------------------------------------------------------------------
      # Step 2: GNATprove flow analysis (Bronze gate)
      # ------------------------------------------------------------------
      - name: "Step 2: GNATprove flow analysis"
        run: alr exec -- gnatprove -P companion.gpr --mode=flow --report=all --warnings=error

      # ------------------------------------------------------------------
      # Step 3: GNATprove proof analysis (Silver gate)
      # ------------------------------------------------------------------
      - name: "Step 3: GNATprove proof"
        run: alr exec -- gnatprove -P companion.gpr --mode=prove --level=2 --prover=cvc5,z3,altergo --steps=0 --timeout=120 --report=all --warnings=error --checks-as-errors=on

      # ------------------------------------------------------------------
      # Step 4: Extract assumptions
      # ------------------------------------------------------------------
      - name: "Step 4: Extract assumptions"
        working-directory: .
        run: scripts/extract_assumptions.sh

      # ------------------------------------------------------------------
      # Step 5: Diff assumptions against baseline
      # ------------------------------------------------------------------
      - name: "Step 5: Diff assumptions"
        working-directory: .
        run: scripts/diff_assumptions.sh

      # ------------------------------------------------------------------
      # Upload artifacts on failure for debugging
      # ------------------------------------------------------------------
      - name: Upload GNATprove output on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gnatprove-output
          path: |
            companion/gen/obj/gnatprove/
            companion/assumptions_extracted.txt
          retention-days: 14

      # ------------------------------------------------------------------
      # Upload assumptions extraction as artifact
      # ------------------------------------------------------------------
      - name: Upload assumptions extraction
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: assumptions-report
          path: |
            companion/assumptions_extracted.txt
            companion/assumptions.yaml
            companion/gen/prove_golden.txt
            companion/gen/obj/gnatprove/gnatprove.out
          retention-days: 30

  # ====================================================================
  # Verified Emission Templates
  # ====================================================================
  templates-verify:
    name: Build & Verify Emission Templates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: companion/templates

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Alire
        uses: alire-project/setup-alire@b607671067a8ca5d7b7f4a12dadb4dc009cd2cc7 # v3
        with:
          toolchain: gnat_native gprbuild

      - name: Initialize Alire workspace and install GNATprove
        run: |
          alr install gnatprove
          echo "${HOME}/.alire/bin" >> "$GITHUB_PATH"

      - name: Record toolchain version for cache key
        id: toolchain-version
        run: echo "gnatprove=$(gnatprove --version 2>&1 | head -1 || echo unknown)" >> "$GITHUB_OUTPUT"

      - name: Cache GNATprove results
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            companion/templates/obj/gnatprove
          key: gnatprove-templates-${{ runner.os }}-${{ steps.toolchain-version.outputs.gnatprove }}-${{ hashFiles('companion/spark/*.ads', 'companion/spark/*.adb', 'companion/templates/*.ads', 'companion/templates/*.adb', 'companion/templates/templates.gpr') }}
          restore-keys: |
            gnatprove-templates-${{ runner.os }}-

      - name: Prepare build directory
        run: mkdir -p obj

      - name: Make scripts executable
        working-directory: .
        run: chmod +x scripts/*.sh

      - name: "Step 1: Compile (alr build)"
        run: alr build

      - name: "Step 2: GNATprove flow analysis"
        run: alr exec -- gnatprove -P templates.gpr --mode=flow --report=all --warnings=error

      - name: "Step 3: GNATprove proof"
        run: alr exec -- gnatprove -P templates.gpr --mode=prove --level=2 --prover=cvc5,z3,altergo --steps=0 --timeout=120 --report=all --warnings=error --checks-as-errors=on

      # ----------------------------------------------------------------
      # Step 4-5: Assumption extraction and diff (matches spark-verify)
      # ----------------------------------------------------------------
      - name: "Step 4: Extract assumptions"
        working-directory: .
        env:
          PROVE_OUT: companion/templates/obj/gnatprove
        run: scripts/extract_assumptions.sh

      - name: "Step 5: Diff assumptions"
        working-directory: .
        env:
          PROVE_GOLDEN: companion/templates/prove_golden.txt
          PROVE_OUT: companion/templates/obj/gnatprove/gnatprove.out
        run: scripts/diff_assumptions.sh

      # ----------------------------------------------------------------
      # Artifacts
      # ----------------------------------------------------------------
      - name: Upload GNATprove output on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: templates-gnatprove-output
          path: |
            companion/templates/obj/gnatprove/
            companion/assumptions_extracted.txt
          retention-days: 14

      - name: Upload templates proof report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: templates-proof-report
          path: |
            companion/assumptions_extracted.txt
            companion/assumptions.yaml
            companion/templates/prove_golden.txt
            companion/templates/obj/gnatprove/gnatprove.out
          retention-days: 30
