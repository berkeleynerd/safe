name: Claude Security Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            Focus exclusively on security concerns in this pull request:

            1. Command injection in scripts (Python subprocess calls,
               shell=True, unsanitized paths)
            2. Path traversal in file operations (emitter output paths,
               cache paths, temp directories)
            3. Supply chain risks in CI (unpinned downloads, missing
               checksums, mutable external artifacts)
            4. Proof integrity risks — flag each NEW occurrence introduced by
               this diff:
               (a) `pragma Assume` — especially in emitter output paths or
                   shared stdlib, where an unchecked assumption becomes a proof
                   gap.
               (b) `pragma SPARK_Mode (Off)` applied to a unit under
                   `compiler_impl/stdlib/ada/` or any shared stdlib package —
                   these are trust-boundary expansions and must be justified.
               (c) `Skip_Proof`, `pragma Annotate (GNATprove, Skip_Proof, ...)`,
                   or `pragma Annotate (GNATprove, False_Positive, ...)` on
                   safety-critical checks.
               (d) New trusted boundaries: any new unit added to a
                   trusted-stdlib allowlist, new `Global => null` on a body that
                   reads external state, or new `Pure` / `Preelaborate` claims
                   on impure bodies.
               Do not flag occurrences that already existed before the diff.
            5. Deserialization safety (JSON parsing of safei/typed/MIR
               files from untrusted sources)

            Do NOT flag: Ada style, Python style, documentation gaps,
            test coverage, or performance concerns. Only flag concrete
            security vulnerabilities with specific file/line references.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*)"
