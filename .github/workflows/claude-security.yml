name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  security:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            Focus exclusively on security concerns in this pull request:

            1. Command injection in scripts (Python subprocess calls,
               shell=True, unsanitized paths)
            2. Path traversal in file operations (emitter output paths,
               cache paths, temp directories)
            3. Supply chain risks in CI (unpinned downloads, missing
               checksums, mutable external artifacts)
            4. Proof integrity risks (new pragma Assume, new SPARK_Mode
               Off, new Skip_Proof that could mask safety violations)
            5. Deserialization safety (JSON parsing of safei/typed/MIR
               files from untrusted sources)

            Do NOT flag: Ada style, Python style, documentation gaps,
            test coverage, or performance concerns. Only flag concrete
            security vulnerabilities with specific file/line references.
