name: Gate Pipeline Verify

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pipeline-verify:
    name: Pipeline Verify
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      PYTHONHASHSEED: "0"
      LC_ALL: C.UTF-8
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Install Alire toolchain
        uses: ./.github/actions/setup-alire

      - name: Run canonical gate pipeline verify
        run: python3 scripts/run_gate_pipeline.py verify --authority ci
