name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  id-token: write
  pull-requests: write
  issues: write

jobs:
  auto-review:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Focus on:
            - Correctness: logic errors, off-by-one, missing cases
            - Ada/SPARK issues: visibility violations, missing pragma, incorrect renames signatures
            - Dead code or duplicated code introduced by the change
            - Any change that could alter emitted Ada output (refactoring PRs must be output-preserving)
            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for line-specific issues.
            Only post GitHub comments - don't submit review text as messages.
            Keep feedback concise and actionable. Do not comment on style unless it affects correctness.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  interactive:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve PR head checkout
        id: pr-head
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          pr_head=$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '[.head.repo.full_name, .head.ref] | @tsv')
          IFS=$'\t' read -r head_repo head_ref <<< "$pr_head"

          if [ "$head_repo" = "null" ] || [ -z "$head_repo" ] || [ -z "$head_ref" ]; then
            echo "::error::Unable to resolve PR #${PR_NUMBER} head repository/ref"
            exit 1
          fi

          printf 'repository=%s\n' "$head_repo" >> "$GITHUB_OUTPUT"
          printf 'ref=%s\n' "$head_ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          repository: ${{ steps.pr-head.outputs.repository }}
          ref: ${{ steps.pr-head.outputs.ref }}

      - uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          trigger_phrase: "@claude"
