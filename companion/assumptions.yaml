# ============================================================================
#  A -- Implementation / Target Assumptions
# ============================================================================

- id: A-01
  summary: "64-bit intermediate integer evaluation"
  description: >
    The implementation provides at least 64-bit intermediate evaluation for
    all integer arithmetic expressions, matching the Safe specification's
    wide-arithmetic model (D27 Rule 1).  Long_Long_Integer is used as the
    SPARK proxy for the mathematical-integer intermediate type.
  spec_reference: "spec/02-restrictions.md#2.8.1"
  affects:
    - Safe_PO.Safe_Div
    - Safe_PO.Narrow_Assignment
    - Safe_PO.Narrow_Parameter
    - Safe_PO.Narrow_Return
    - Safe_PO.Narrow_Indexing
    - Safe_PO.Narrow_Conversion
  severity: critical
  status: open

- id: A-02
  summary: "IEEE 754 non-trapping floating-point mode"
  description: >
    The target hardware and runtime support IEEE 754 binary64 (Long_Float)
    in non-trapping mode.  NaN and infinity propagate silently through
    intermediate computations; the companion models check-at-narrowing
    rather than check-at-production (D27 Rule 5).
  spec_reference: "spec/02-restrictions.md#2.8.5"
  affects:
    - Safe_PO.FP_Not_NaN
    - Safe_PO.FP_Not_Infinity
    - Safe_PO.FP_Safe_Div
  severity: critical
  status: open

- id: A-03
  summary: "Static range analysis is sound"
  description: >
    The compiler's static range-analysis pass correctly computes conservative
    bounds for every integer sub-expression.  The Range64 ghost model
    captures only the interface (Contains, Subset, Intersect, Widen);
    soundness of the analysis itself is assumed.
  spec_reference: "spec/05-assurance.md#5.3.6"
  affects:
    - Safe_Model.Range64
    - Safe_Model.Contains
    - Safe_Model.Subset
    - Safe_Model.Intersect
    - Safe_Model.Widen
  severity: critical
  status: open

- id: A-04
  summary: "Channel implementation correctly serializes access"
  description: >
    The runtime implementation of channels (bounded FIFO queues) correctly
    serializes concurrent send and receive operations using Ada protected
    objects or equivalent synchronization.  The ghost Channel_State model
    assumes sequential access to channel state.
  spec_reference: "spec/04-tasks-and-channels.md#4.3"
  affects:
    - Safe_PO.Check_Channel_Not_Full
    - Safe_PO.Check_Channel_Not_Empty
    - Safe_PO.Check_Channel_Capacity_Positive
    - Safe_Model.Channel_State
  severity: critical
  status: open

- id: A-05
  summary: "FP division result is finite when operands are finite"
  description: >
    The FP_Safe_Div body has a float overflow check that GNATprove cannot
    discharge at level 2: dividing a finite X by a very small finite Y
    (e.g., subnormal) can produce infinity.  The compiler's narrowing-point
    analysis guarantees the result is finite before it reaches a narrowing
    point (D27 Rule 5).  This runtime guarantee is modeled by a pragma
    Annotate (GNATprove, Intentional) in the FP_Safe_Div body.
  spec_reference: "spec/02-restrictions.md#2.8.5"
  affects:
    - Safe_PO.FP_Safe_Div
  severity: major
  status: open
  note: "M3-AUD-002: GNATprove counterexample: X=-1.1e-5, Y=1.3e-318 → overflow."

- id: A-06
  summary: "Heap runtime bodies correctly implement their spec contracts"
  description: >
    Heap-backed runtime packages use SPARK_Mode Off bodies for allocation,
    copying, deallocation, and selected equality operations.  GNATprove reasons
    through their visible spec contracts but does not prove that the bodies
    implement those contracts.  This assumption covers Safe_String_RT,
    Safe_Array_RT, Safe_Array_Identity_RT, Safe_Ownership_RT, and the
    generated Clone_Element / Free_Element seams that connect emitted Safe
    types to those runtimes.  Safe_String_RT.Equal's string-equality
    postcondition is a named manually-verified subcase of this assumption.
  spec_reference: "spec/05-assurance.md#5.3.1"
  affects:
    - Safe_String_RT
    - Safe_Array_RT
    - Safe_Array_Identity_RT
    - Safe_Ownership_RT
    - "Generated Clone_Element and Free_Element formals"
    - "Safe_String_RT.Equal postcondition"
  severity: critical
  status: open
  note: "PR11.22h.2 records an existing trust boundary exposed by the shared runtime contract audit; it does not add new runtime behavior. Detailed boundary inventory: docs/emitted_output_verification_matrix.md#spark_mode-off-boundary-inventory."

